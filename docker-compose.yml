# KLIPAURA — local or VPS stack. Point Redis to Upstash or run a local redis service.
# Example: docker compose --profile local-redis up

services:
  klip-api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      PORT: "8080"
    command: ["uvicorn", "hitl_server:app", "--app-dir", "klip-dispatch", "--host", "0.0.0.0", "--port", "8080"]

  klip-worker:
    build: .
    env_file:
      - .env
    command: ["python", "klip-avatar/worker.py"]

  klip-scheduler:
    build: .
    env_file:
      - .env
    environment:
      AUTOPILOT_MODE: "1"
    command: ["python", "scheduler.py"]
    profiles:
      - autopilot

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles:
      - local-redis
