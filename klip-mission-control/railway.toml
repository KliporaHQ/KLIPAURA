# Mission Control — Next.js 14 (App Router) + standalone `next build` output
#
# Railway dashboard (KLIPAURA / frontend service) — REQUIRED:
#   Root Directory:  klip-mission-control   (NOT repo root — root uses Dockerfile → HITL API only)
#   After env changes to NEXT_PUBLIC_*:  Deploy → "Clear build cache" + Redeploy
#
# Build-time env (baked into client bundle — set on this service, then rebuild):
#   NEXT_PUBLIC_API_BASE_URL = https://<your-public-Mission-Control-API-host>
#     Point at the service running FastAPI `main.py` (port 8000), not only `hitl_server`,
#     or Avatar Studio + /api/v1/* will not match. See README.md "Avatar Studio / Mission Control API".
#   Optional: NEXT_PUBLIC_GIT_SHA, NEXT_PUBLIC_HITL_URL, CORS on API side for that origin.
#
# `package.json` start script uses `next start --hostname 0.0.0.0`; Railway sets PORT automatically.

[build]
buildCommand = "npm install && npm run build"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
healthcheckTimeout = 60
