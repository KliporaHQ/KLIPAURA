# KLIPAURA — MC API (repo root)
# In Railway: set **Root Directory** to `.` (repository root) for this service.
# Companion UI config: `klip-mission-control/railway.toml`

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
# Cold starts / image pull: allow margin beyond default probe interval
healthcheckTimeout = 60
