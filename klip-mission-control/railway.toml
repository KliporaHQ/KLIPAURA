# Mission Control — Next.js 14 (App Router) + standalone `next build` output
# In Railway: set **Root Directory** to `klip-mission-control` for this service.
#
# Bind 0.0.0.0: platforms often set HOSTNAME to the container id; Next would listen on the
# wrong interface without --hostname (see docker-entrypoint.sh). PORT is read by Next from env.

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm run start"
restartPolicyType = "ON_FAILURE"
healthcheckPath = "/health"
healthcheckTimeout = 60
