<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KLIPAURA Mission Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto max-w-7xl px-4 py-6">
    <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
      <div>
        <div class="text-xs tracking-widest text-slate-400">KLIPAURA</div>
        <h1 class="text-2xl font-semibold">Mission Control</h1>
        <div id="sub" class="mt-1 text-sm text-slate-400"></div>
      </div>
      <div class="flex flex-wrap gap-2">
        <button data-tab="ops" class="tab-btn rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-sm">Ops</button>
        <button data-tab="queue" class="tab-btn rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-sm">Queue</button>
        <button data-tab="jobs" class="tab-btn rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-sm">Jobs</button>
        <button data-tab="hitl" class="tab-btn rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-sm">HITL</button>
        <button data-tab="avatars" class="tab-btn rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-sm">Avatars</button>
        <button data-tab="analytics" class="tab-btn rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-sm">Analytics</button>
        <button data-tab="settings" class="tab-btn rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-sm">Settings</button>
      </div>
    </div>

    <div id="toast" class="mt-4 hidden rounded-xl border border-slate-800 bg-slate-900 p-3 text-sm"></div>

    <div id="ops" class="tab mt-6"></div>
    <div id="queue" class="tab mt-6 hidden"></div>
    <div id="jobs" class="tab mt-6 hidden"></div>
    <div id="hitl" class="tab mt-6 hidden"></div>
    <div id="avatars" class="tab mt-6 hidden"></div>
    <div id="analytics" class="tab mt-6 hidden"></div>
    <div id="settings" class="tab mt-6 hidden"></div>
  </div>

  <script>
    const state = {
      ops: null,
      credits: null,
      queueSummary: null,
      queueJobs: [],
      queueSelected: new Set(),
      templates: [],
      avatars: [],
      selectedAvatarId: null,
      selectedJobId: null,
      hitlJob: null,
      adminKey: localStorage.getItem('mc_admin_key') || '',
      opsKey: localStorage.getItem('mc_ops_key') || '',
      showAdminKey: false,
      showOpsKey: false,
      analytics: null,
      chartOutcomes: null,
      chartTemplates: null,
    };

    function qs(sel) { return document.querySelector(sel); }
    function qsa(sel) { return Array.from(document.querySelectorAll(sel)); }

    function toast(msg, kind='info') {
      const el = qs('#toast');
      el.classList.remove('hidden');
      el.className = 'mt-4 rounded-xl border p-3 text-sm ' + (
        kind === 'error'
          ? 'border-rose-900/60 bg-rose-950/40 text-rose-100'
          : kind === 'ok'
            ? 'border-emerald-900/60 bg-emerald-950/40 text-emerald-100'
            : 'border-slate-800 bg-slate-900 text-slate-100'
      );
      el.textContent = msg;
      clearTimeout(toast._t);
      toast._t = setTimeout(() => { el.classList.add('hidden'); }, 6000);
    }

    function fmt(n) {
      if (n == null) return '—';
      try { return String(n); } catch { return '—'; }
    }

    function htmlesc(s) {
      return String(s == null ? '' : s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }

    async function api(path, opts={}) {
      const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
      if (opts.admin) {
        if (!state.adminKey) throw new Error('ADMIN key missing (Settings → Admin key)');
        headers['X-Admin-Key'] = state.adminKey;
      }
      if (opts.ops) {
        if (!state.opsKey) throw new Error('OPS key missing (Settings → Ops key)');
        headers['X-Ops-Key'] = state.opsKey;
      }
      const res = await fetch(path, Object.assign({}, opts, { headers }));
      const text = await res.text();
      let json = null;
      try { json = text ? JSON.parse(text) : null; } catch { json = null; }
      if (!res.ok) {
        const detail = json && json.detail ? (typeof json.detail === 'string' ? json.detail : JSON.stringify(json.detail)) : (text || ('HTTP ' + res.status));
        const err = new Error(detail);
        err.status = res.status;
        err.body = json || text;
        throw err;
      }
      return json;
    }

    function setTab(name) {
      qsa('.tab').forEach(el => el.classList.add('hidden'));
      qs('#' + name).classList.remove('hidden');
      qsa('.tab-btn').forEach(b => {
        const active = b.getAttribute('data-tab') === name;
        b.classList.toggle('bg-slate-800', active);
        b.classList.toggle('bg-slate-900', !active);
        b.classList.toggle('border-slate-700', active);
        b.classList.toggle('border-slate-800', !active);
      });
    }

    qsa('.tab-btn').forEach(b => b.addEventListener('click', () => {
      const name = b.getAttribute('data-tab');
      setTab(name);
      if (name === 'analytics' && state.adminKey) loadAnalytics().catch(() => {});
    }));

    async function loadOps() {
      state.ops = await api('/api/ops/summary', { method: 'GET' });
      renderOps();
      renderJobs();
    }

    async function loadQueue() {
      state.queueSummary = await api('/api/queue/summary', { method: 'GET', admin: true });
      const j = await api('/api/queue/list?limit=80', { method: 'GET', admin: true });
      state.queueJobs = (j && j.jobs) ? j.jobs : [];
      renderQueue();
    }

    async function loadCredits() {
      state.credits = await api('/api/providers/credits', { method: 'GET', admin: true });
      renderOps();
    }

    async function loadTemplates() {
      try {
        const j = await api('/api/templates', { method: 'GET' });
        state.templates = (j && j.templates) ? j.templates : [];
      } catch {
        state.templates = [];
      }
    }

    async function loadAvatars() {
      const j = await api('/api/avatars', { method: 'GET' });
      state.avatars = (j && j.avatars) ? j.avatars : [];
      if (!state.selectedAvatarId && state.avatars.length) state.selectedAvatarId = state.avatars[0].avatar_id;
      renderAvatars();
      renderJobs();
    }

    function badge(ok, label) {
      return `<span class="inline-flex items-center rounded-full border px-2 py-0.5 text-xs ${ok ? 'border-emerald-800/60 bg-emerald-950/50 text-emerald-100' : 'border-amber-800/60 bg-amber-950/40 text-amber-100'}">${htmlesc(label)}</span>`;
    }

    function card(title, inner) {
      return `<div class="rounded-2xl border border-slate-800 bg-slate-900/40 p-4">` +
        `<div class="mb-3 text-sm font-semibold">${htmlesc(title)}</div>` + inner + `</div>`;
    }

    function renderQueue() {
      const el = qs('#queue');
      if (!state.adminKey) {
        el.innerHTML = card('Queue', `<div class="text-sm text-slate-300">Enter your Admin password in <span class="text-slate-200">Settings</span> to access queue controls.</div>`);
        return;
      }
      const tplName = (id) => {
        const key = (id || '').toString().trim();
        if (!key) return '—';
        const t = (state.templates || []).find(x => (x && x.id) === key);
        return t ? (t.name || t.id || key) : key;
      };
      const s = state.queueSummary || {};
      const q = (s.queues || {});
      const c = (s.status_counts_recent || {});
      const globalPaused = !!s.global_paused;

      const cards = [
        { k: 'Queued', v: fmt(c.QUEUED) },
        { k: 'Processing', v: fmt(c.PROCESSING) },
        { k: 'Pending review', v: fmt(q.hitl_pending) },
        { k: 'Published', v: fmt(c.PUBLISHED) },
      ].map(x => `<div class="rounded-2xl border border-slate-800 bg-slate-950/40 p-4"><div class="text-2xl font-semibold">${htmlesc(x.v)}</div><div class="mt-1 text-xs tracking-widest text-slate-400">${htmlesc(x.k)}</div></div>`).join('');

      const toggleBtn = globalPaused
        ? `<button class="rounded-xl bg-emerald-500 px-4 py-2 text-sm font-semibold text-slate-950" onclick="queueResumeGlobal()">Resume worker</button>`
        : `<button class="rounded-xl bg-amber-400 px-4 py-2 text-sm font-semibold text-slate-950" onclick="queuePauseGlobal()">Pause worker</button>`;

      const rows = (state.queueJobs || []).map(job => {
        const id = job.job_id;
        const checked = state.queueSelected.has(id);
        const st = (job.status || '—');
        const prod = (job.product_url || '').toString();
        const tpl = tplName(job.template || job.template_id || '');
        const actions = `
          <div class="flex flex-wrap gap-2">
            <button class="rounded-xl border border-slate-800 bg-slate-900 px-3 py-1.5 text-xs" onclick="queuePauseJob('${htmlesc(id)}')">Pause</button>
            <button class="rounded-xl border border-slate-800 bg-slate-900 px-3 py-1.5 text-xs" onclick="queueResumeJob('${htmlesc(id)}')">Resume</button>
            <button class="rounded-xl border border-rose-900/60 bg-rose-950/30 px-3 py-1.5 text-xs text-rose-100" onclick="queueDeleteJob('${htmlesc(id)}')">Delete</button>
          </div>
        `;
        return `<tr class="border-t border-slate-800/70">
          <td class="py-2 pr-2"><input type="checkbox" ${checked ? 'checked' : ''} onchange="queueToggleSelect('${htmlesc(id)}', this.checked)" /></td>
          <td class="py-2 pr-2 font-mono text-xs text-slate-200">${htmlesc(id)}</td>
          <td class="py-2 pr-2 text-sm">${htmlesc(st)}</td>
          <td class="py-2 pr-2 text-xs text-slate-300">${htmlesc(prod)}</td>
          <td class="py-2 pr-2 text-sm">${htmlesc(tpl)}</td>
          <td class="py-2">${actions}</td>
        </tr>`;
      }).join('');

      const inner = `
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div class="flex flex-wrap gap-2">
            ${badge(!globalPaused, globalPaused ? 'Worker paused' : 'Worker running')}
            ${badge(true, 'Pending: ' + fmt(q.jobs_pending))}
            ${badge(true, 'Paused: ' + fmt(q.jobs_paused))}
            ${badge(true, 'DLQ: ' + fmt(q.dlq))}
          </div>
          <div class="flex flex-wrap gap-2">
            ${toggleBtn}
            <button class="rounded-xl border border-slate-800 bg-slate-900 px-4 py-2 text-sm" onclick="loadQueue()">Refresh</button>
          </div>
        </div>

        <div class="mt-4 grid grid-cols-1 gap-3 sm:grid-cols-2 lg:grid-cols-4">${cards}</div>

        <div class="mt-6 rounded-2xl border border-slate-800 bg-slate-900/40 p-4">
          <div class="flex flex-wrap items-center justify-between gap-2">
            <div class="text-sm font-semibold">Jobs</div>
            <div class="flex flex-wrap gap-2">
              <button class="rounded-xl border border-slate-800 bg-slate-900 px-4 py-2 text-sm" onclick="queueBulkDeleteSelected()">Delete selected</button>
              <button class="rounded-xl border border-slate-800 bg-slate-900 px-4 py-2 text-sm" onclick="queueRetryFailed24h()">Retry failed (24h)</button>
            </div>
          </div>
          <div class="mt-3 overflow-x-auto">
            <table class="w-full min-w-[920px]">
              <thead>
                <tr class="text-left text-xs tracking-widest text-slate-400">
                  <th class="pb-2 pr-2">SEL</th>
                  <th class="pb-2 pr-2">ID</th>
                  <th class="pb-2 pr-2">STATUS</th>
                  <th class="pb-2 pr-2">PRODUCT</th>
                  <th class="pb-2 pr-2">TEMPLATE</th>
                  <th class="pb-2">ACTIONS</th>
                </tr>
              </thead>
              <tbody>${rows || `<tr class="border-t border-slate-800/70"><td colspan="6" class="py-4 text-sm text-slate-400">No jobs found.</td></tr>`}</tbody>
            </table>
          </div>
        </div>
      `;

      el.innerHTML = inner;
    }

    function queueToggleSelect(jobId, checked) {
      if (checked) state.queueSelected.add(jobId);
      else state.queueSelected.delete(jobId);
    }

    async function queuePauseGlobal() {
      try {
        await api('/api/queue/pause/global', { method: 'POST', body: '{}', admin: true });
        toast('Worker paused', 'ok');
        await loadQueue();
      } catch (e) { toast(e.message || String(e), 'error'); }
    }

    async function queueResumeGlobal() {
      try {
        await api('/api/queue/resume/global', { method: 'POST', body: '{}', admin: true });
        toast('Worker resumed', 'ok');
        await loadQueue();
      } catch (e) { toast(e.message || String(e), 'error'); }
    }

    async function queuePauseJob(jobId) {
      try {
        await api('/api/queue/pause/' + encodeURIComponent(jobId), { method: 'POST', body: '{}', admin: true });
        toast('Paused ' + jobId, 'ok');
        await loadQueue();
      } catch (e) { toast(e.message || String(e), 'error'); }
    }

    async function queueResumeJob(jobId) {
      try {
        await api('/api/queue/resume/' + encodeURIComponent(jobId), { method: 'POST', body: '{}', admin: true });
        toast('Resumed ' + jobId, 'ok');
        await loadQueue();
      } catch (e) { toast(e.message || String(e), 'error'); }
    }

    async function queueDeleteJob(jobId) {
      try {
        if (!confirm('Delete job ' + jobId + '? This removes it from queues and deletes artifacts best-effort.')) return;
        await api('/api/queue/' + encodeURIComponent(jobId), { method: 'DELETE', admin: true });
        state.queueSelected.delete(jobId);
        toast('Deleted ' + jobId, 'ok');
        await loadQueue();
      } catch (e) { toast(e.message || String(e), 'error'); }
    }

    async function queueBulkDeleteSelected() {
      try {
        const ids = Array.from(state.queueSelected);
        if (!ids.length) { toast('No jobs selected', 'info'); return; }
        if (!confirm('Delete ' + ids.length + ' job(s)?')) return;
        await api('/api/queue/bulk-delete', { method: 'POST', body: JSON.stringify({ job_ids: ids }), admin: true });
        state.queueSelected = new Set();
        toast('Bulk delete done', 'ok');
        await loadQueue();
      } catch (e) { toast(e.message || String(e), 'error'); }
    }

    async function queueRetryFailed24h() {
      try {
        if (!confirm('Retry failed jobs from the last 24 hours?')) return;
        const j = await api('/api/queue/retry-failed', { method: 'POST', body: JSON.stringify({ hours: 24, limit: 50 }), admin: true });
        toast('Retried: ' + fmt((j && j.requeued) ? j.requeued.length : 0), 'ok');
        await loadQueue();
      } catch (e) { toast(e.message || String(e), 'error'); }
    }

    function destroyMcChart(ref) {
      if (ref && typeof ref.destroy === 'function') {
        try { ref.destroy(); } catch (e) { /* ignore */ }
      }
      return null;
    }

    async function loadAnalytics() {
      try {
        state.analytics = await api('/api/analytics/summary', { method: 'GET', admin: true });
        renderAnalytics();
      } catch (e) {
        state.analytics = null;
        renderAnalytics();
        toast(e.message || String(e), 'error');
      }
    }

    function renderAnalytics() {
      const el = qs('#analytics');
      if (!state.adminKey) {
        el.innerHTML = card('Analytics', `<div class="text-sm text-slate-300">Enter your Admin password in <span class="text-slate-200">Settings</span> to view analytics.</div>`);
        return;
      }
      const a = state.analytics;
      if (!a || !a.ok) {
        el.innerHTML = card('Analytics', `<div class="text-sm text-slate-400">Load data with Refresh.</div>`);
        return;
      }

      const note = (a.note || '').toString();
      const og = a.outcome_groups || {};
      const rows = (a.by_template || []).map(r => {
        return `<tr class="border-t border-slate-800/70">
          <td class="py-2 pr-2 text-sm font-medium text-slate-200">${htmlesc(r.template_name || r.template_id)}</td>
          <td class="py-2 pr-2 font-mono text-xs">${fmt(r.jobs_total)}</td>
          <td class="py-2 pr-2 font-mono text-xs">${fmt(r.published)}</td>
          <td class="py-2 pr-2 font-mono text-xs">${fmt(r.publish_rate_pct)}%</td>
          <td class="py-2 pr-2 font-mono text-xs">${fmt(r.approval_rate_pct)}%</td>
          <td class="py-2 pr-2 font-mono text-xs">${fmt(r.ledger_lines)}</td>
          <td class="py-2 font-mono text-xs">${fmt(r.ledger_post_url_rate_pct)}%</td>
        </tr>`;
      }).join('') || `<tr><td colspan="7" class="py-4 text-sm text-slate-400">No job manifests found.</td></tr>`;

      el.innerHTML = `
        <div class="flex flex-wrap items-center justify-between gap-3">
          <div class="text-sm text-slate-400">Scanned <span class="text-slate-200">${fmt(a.jobs_scanned)}</span> job manifests</div>
          <button class="rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-sm" onclick="loadAnalytics()">Refresh</button>
        </div>
        <p class="mt-2 text-xs leading-relaxed text-slate-500">${htmlesc(note)}</p>
        <div class="mt-4 grid grid-cols-1 gap-4 lg:grid-cols-2">
          ${card('Job outcomes (grouped)', `
            <div class="relative mx-auto max-h-[280px] max-w-md">
              <canvas id="mc_chart_outcomes"></canvas>
            </div>
          `)}
          ${card('Template performance', `
            <p class="mb-2 text-xs text-slate-500">Bars: publish rate (% of jobs). Line: ledger post-URL rate (proxy for link live).</p>
            <div class="relative max-h-[320px]">
              <canvas id="mc_chart_templates"></canvas>
            </div>
          `)}
        </div>
        <div class="mt-6 rounded-2xl border border-slate-800 bg-slate-900/40 p-4">
          <div class="mb-2 text-sm font-semibold">Per-template metrics</div>
          <div class="overflow-x-auto">
            <table class="w-full min-w-[880px] text-left text-sm">
              <thead>
                <tr class="text-xs tracking-widest text-slate-400">
                  <th class="pb-2 pr-2">Template</th>
                  <th class="pb-2 pr-2">Jobs</th>
                  <th class="pb-2 pr-2">Published</th>
                  <th class="pb-2 pr-2">Publish %</th>
                  <th class="pb-2 pr-2">Approval %</th>
                  <th class="pb-2 pr-2">Ledger lines</th>
                  <th class="pb-2">Post URL %</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>
      `;

      state.chartOutcomes = destroyMcChart(state.chartOutcomes);
      state.chartTemplates = destroyMcChart(state.chartTemplates);

      if (typeof Chart === 'undefined') {
        return;
      }

      const labelsOg = [];
      const dataOg = [];
      const colors = ['#22c55e', '#38bdf8', '#eab308', '#f43f5e', '#a855f7', '#64748b'];
      const keysOrder = ['PUBLISHED', 'IN_FLIGHT', 'MANUAL_PUBLISH_REQUIRED', 'REJECTED', 'FAILED', 'OTHER'];
      const bgOg = [];
      keysOrder.forEach((k, i) => {
        const v = Number(og[k] || 0);
        if (v > 0) {
          labelsOg.push(k.replace(/_/g, ' '));
          dataOg.push(v);
          bgOg.push(colors[i % colors.length]);
        }
      });
      const co = qs('#mc_chart_outcomes');
      if (co && labelsOg.length) {
        state.chartOutcomes = new Chart(co, {
          type: 'doughnut',
          data: {
            labels: labelsOg,
            datasets: [{ data: dataOg, backgroundColor: bgOg, borderWidth: 0 }],
          },
          options: {
            plugins: { legend: { position: 'bottom', labels: { color: '#cbd5e1', font: { size: 11 } } } },
            maintainAspectRatio: true,
          },
        });
      }

      const bt = a.by_template || [];
      const labelsT = bt.map(r => (r.template_name || r.template_id || '').toString().slice(0, 28));
      const pubPct = bt.map(r => Number(r.publish_rate_pct || 0));
      const urlPct = bt.map(r => Number(r.ledger_post_url_rate_pct || 0));
      const ct = qs('#mc_chart_templates');
      if (ct && labelsT.length) {
        state.chartTemplates = new Chart(ct, {
          type: 'bar',
          data: {
            labels: labelsT,
            datasets: [
              {
                type: 'bar',
                label: 'Publish % (jobs)',
                data: pubPct,
                backgroundColor: 'rgba(56, 189, 248, 0.55)',
                borderColor: 'rgba(56, 189, 248, 0.9)',
                borderWidth: 1,
                yAxisID: 'y',
              },
              {
                type: 'line',
                label: 'Post URL % (ledger)',
                data: urlPct,
                borderColor: '#a78bfa',
                backgroundColor: 'rgba(167, 139, 250, 0.2)',
                yAxisID: 'y',
                tension: 0.25,
                pointRadius: 3,
              },
            ],
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: { ticks: { color: '#94a3b8', maxRotation: 45, minRotation: 0, font: { size: 10 } }, grid: { color: 'rgba(148,163,184,0.12)' } },
              y: { min: 0, max: 100, ticks: { color: '#94a3b8' }, grid: { color: 'rgba(148,163,184,0.12)' } },
            },
            plugins: {
              legend: { labels: { color: '#cbd5e1', font: { size: 11 } } },
            },
          },
        });
      }
    }

    function renderOps() {
      const el = qs('#ops');
      const o = state.ops || {};
      const q = o.queues || {};
      const w = o.worker || {};
      const prov = o.providers || {};
      const keys = (prov.api_keys_present || {});
      const ff = (prov.ffmpeg || {});
      const budget = o.budget || {};
      const rev = o.revenue || {};

      const workerOnline = !!(w && w.state);
      const workerLabel = workerOnline ? ('Worker ' + String(w.state)) : 'Worker offline';

      qs('#sub').innerHTML = `Redis: <span class="text-slate-200">${o.redis_ok ? 'connected' : 'not configured'}</span> · <span class="text-slate-200">${htmlesc(workerLabel)}</span> · R2: <span class="text-slate-200">${o.r2_configured ? 'on' : 'off'}</span>`;

      const pills = [
        badge(!!o.redis_ok, 'Redis'),
        badge(workerOnline, workerLabel),
        badge(!!o.r2_configured, 'R2'),
        badge(!!ff.on_path, ff.on_path ? 'FFmpeg' : 'FFmpeg missing'),
        badge(!!keys.groq, keys.groq ? 'Groq key' : 'Groq key missing'),
        badge(!!keys.elevenlabs, keys.elevenlabs ? 'ElevenLabs key' : 'ElevenLabs key missing'),
        badge(!!keys.wavespeed, keys.wavespeed ? 'WaveSpeed key' : 'WaveSpeed key missing'),
      ].join(' ');

      const stats = [
        { k: 'Jobs pending', v: fmt(q.jobs_pending) },

    async function createJob() {
      try {
        const product_url = qs('#job_product_url').value.trim();
        const avatar_id = (qs('#job_avatar').value || '').trim();
        const template_id = (qs('#job_template') ? (qs('#job_template').value || '').trim() : '');
        if (!product_url || product_url.length < 8) throw new Error('Enter a valid product URL');
        if (!avatar_id) throw new Error('Select an avatar');

        const product_page_url = qs('#job_product_page_url').value.trim();
        const imagesRaw = qs('#job_images').value.trim();
        const title = qs('#job_title').value.trim();
        const bulletsRaw = qs('#job_bullets').value.trim();
        const cta_line = qs('#job_cta').value.trim();
        const script_system_override = qs('#job_sys').value.trim();
        const elevenlabs_voice_id = qs('#job_voice').value.trim();

        const body = { product_url, avatar_id };
        if (template_id) body.template_id = template_id;
        if (product_page_url) body.product_page_url = product_page_url;
        if (imagesRaw) body.product_image_urls = imagesRaw.split(',').map(s => s.trim()).filter(Boolean);
        if (title) body.product_title = title;
        if (bulletsRaw) body.product_bullets = bulletsRaw.split('\n').map(s => s.trim()).filter(Boolean);
        if (cta_line) body.cta_line = cta_line;
        if (script_system_override) body.script_system_override = script_system_override;
        if (elevenlabs_voice_id) body.elevenlabs_voice_id = elevenlabs_voice_id;

        const j = await api('/api/jobs', { method: 'POST', body: JSON.stringify(body) });
        toast('Queued job ' + j.job_id, 'ok');
        qs('#job_product_url').value = '';
        await refreshAll();
      } catch (e) {
        toast(e.message || String(e), 'error');
      }
    }

        const key = (qs('#ed_getlate_key') ? qs('#ed_getlate_key').value.trim() : '');

        if (voice) social.elevenlabs_voice_id = voice;
        if (tiktok) social.tiktok_account_id = tiktok;
        if (base) social.getlate_base_url = base;
        if (amz) social.amazon_associates_tag = amz;
        if (key) social.getlate_api_key = key;

        const m = qs('#manifestModal');
        m.classList.remove('hidden');

        parts.push(`<div class="text-slate-400 text-xs">Job <span class="font-mono text-slate-200">${htmlesc(jobId)}</span></div>`);

        toast(e.message || String(e), 'error');

    function fileToB64(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve(null);
        const r = new FileReader();
        r.onload = () => {
          const res = String(r.result || '');
          const idx = res.indexOf('base64,');
          resolve(idx >= 0 ? res.slice(idx + 7) : null);
        };
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    async function saveAvatarFromModal() {
      try {
        const avatar_id = qs('#av_id').value.trim();
        if (!avatar_id) throw new Error('avatar_id required');

        let social = null;
        const socialRaw = qs('#av_social').value.trim();
        if (socialRaw) social = JSON.parse(socialRaw);

        const sc = Object.assign({}, (social && typeof social === 'object') ? social : {});
        const voice = qs('#av_voice').value.trim();
        const getlateKey = qs('#av_getlate_key').value.trim();
        const getlateBase = qs('#av_getlate_base').value.trim();
        const tiktok = qs('#av_tiktok').value.trim();
        const amz = qs('#av_amz').value.trim();
        if (voice) sc.elevenlabs_voice_id = voice;
        if (getlateKey) sc.getlate_api_key = getlateKey;
        if (getlateBase) sc.getlate_base_url = getlateBase;
        if (tiktok) sc.tiktok_account_id = tiktok;
        if (amz) sc.amazon_associates_tag = amz;

        const portraitB64 = await fileToB64(qs('#av_portrait').files[0]);
        const faceB64 = await fileToB64(qs('#av_face').files[0]);

        const persona = {
          avatar_id,
          name: qs('#av_name').value.trim() || avatar_id,
          niche: qs('#av_niche').value.trim(),
          description: qs('#av_desc').value.trim(),
        };
        const cta = qs('#av_cta').value.trim();
        const sys = qs('#av_sys').value.trim();
        if (cta) persona.cta_line = cta;
        if (sys) persona.ugc_script_system_override = sys;

        const body = { avatar_id, persona };
        if (Object.keys(sc).length) body.social_config = sc;
        if (portraitB64) body.portrait_png_b64 = portraitB64;
        if (faceB64) body.face_png_b64 = faceB64;

        await api('/api/avatars', { method: 'POST', body: JSON.stringify(body), admin: true });
        toast('Avatar created: ' + avatar_id, 'ok');
        closeAvatarModal();
        await loadAvatars();

    async function _saveAvatarSilent() {
      // Save avatar without closing the modal — used internally before generate
      const avatar_id = qs('#av_id').value.trim();
      if (!avatar_id) throw new Error('Fill in Avatar ID first');
      let social = null;
      const socialRaw = qs('#av_social').value.trim();
      if (socialRaw) social = JSON.parse(socialRaw);
      const sc = Object.assign({}, (social && typeof social === 'object') ? social : {});
      const voice = qs('#av_voice').value.trim();
      const getlateKey = qs('#av_getlate_key').value.trim();
      const getlateBase = qs('#av_getlate_base').value.trim();
      const tiktok = qs('#av_tiktok').value.trim();
      const amz = qs('#av_amz').value.trim();
      if (voice) sc.elevenlabs_voice_id = voice;
      if (getlateKey) sc.getlate_api_key = getlateKey;
      if (getlateBase) sc.getlate_base_url = getlateBase;
      if (tiktok) sc.tiktok_account_id = tiktok;
      if (amz) sc.amazon_associates_tag = amz;
      const portraitB64 = await fileToB64(qs('#av_portrait').files[0]);
      const faceB64 = await fileToB64(qs('#av_face').files[0]);
      const persona = {
        avatar_id,
        name: qs('#av_name').value.trim() || avatar_id,
        niche: qs('#av_niche').value.trim(),
        description: qs('#av_desc').value.trim(),
      };
      const cta = qs('#av_cta').value.trim();
      const sys = qs('#av_sys').value.trim();
      if (cta) persona.cta_line = cta;
      if (sys) persona.ugc_script_system_override = sys;
      const body = { avatar_id, persona };
      if (Object.keys(sc).length) body.social_config = sc;
      if (portraitB64) body.portrait_png_b64 = portraitB64;
      if (faceB64) body.face_png_b64 = faceB64;
      // Try POST (create); if 409/already exists, that's fine — avatar exists, proceed
      try {
        await api('/api/avatars', { method: 'POST', body: JSON.stringify(body), admin: true });
      } catch (e) {
        // If the avatar already exists (409 or "already exists"), swallow and continue
        if (!((e.status === 409) || (e.message && e.message.toLowerCase().includes('already exists')) || (e.message && e.message.toLowerCase().includes('conflict')))) {
          throw e;
        }
      }
    }

        editorStatus('Generating portrait image… (~10s)', 'info');
        await api('/api/avatars/' + encodeURIComponent(aid) + '/generate-portrait', { method: 'POST', body: JSON.stringify({ description }), admin: true });
        editorStatus('✓ Portrait generated! Click Sync to R2 to push to CDN.', 'ok');
        await renderAvatarEditor();
      } catch (e) {
        editorStatus('✗ ' + (e.message || String(e)), 'error');
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = 'Generate portrait'; }
      }
    }

    async function saveAvatarEdits() {
      try {
        const aid = state.selectedAvatarId;
        if (!aid) throw new Error('Select an avatar');
        const personaRaw = qs('#ed_persona').value;
        const socialRaw = qs('#ed_social').value;
        const persona = JSON.parse(personaRaw);
        const social = JSON.parse(socialRaw);
        await api('/api/avatars/' + encodeURIComponent(aid), { method: 'PUT', body: JSON.stringify({ persona, social_config: social }), admin: true });
        toast('Saved', 'ok');
        await loadAvatars();
      } catch (e) {
        toast(e.message || String(e), 'error');
      }
    }

    async function syncAvatarToR2() {
      try {
        const aid = state.selectedAvatarId;
        if (!aid) throw new Error('Select an avatar');
        const j = await api('/api/avatars/' + encodeURIComponent(aid) + '/sync-to-r2', { method: 'POST', body: JSON.stringify({ include_social_config: true }), admin: true });
        toast('Synced to R2: ' + (j.uploaded || []).join(', '), 'ok');
      } catch (e) {
        toast(e.message || String(e), 'error');
      }
    }

    async function deleteAvatar() {
      try {
        const aid = state.selectedAvatarId;
        if (!aid) throw new Error('Select an avatar');
        const delR2 = confirm('Also delete this avatar from R2 storage (best-effort)?\n\nOK = delete from R2 too\nCancel = local delete only');
        if (!confirm('Delete avatar ' + aid + '?')) return;
        await api('/api/avatars/' + encodeURIComponent(aid) + '?delete_r2=' + (delR2 ? 'true' : 'false'), { method: 'DELETE', admin: true });
        toast('Deleted: ' + aid, 'ok');
        state.selectedAvatarId = null;
        await loadAvatars();
      } catch (e) {
        toast(e.message || String(e), 'error');
      }
    }

    function renderSettings() {
      const el = qs('#settings');
      const o = state.ops || {};
      const adminConfigured = !!o.admin_api_configured;
      const opsConfigured = !!o.ops_api_configured;
      const adminType = state.showAdminKey ? 'text' : 'password';
      const opsType = state.showOpsKey ? 'text' : 'password';
      el.innerHTML = `
        <div class="grid grid-cols-1 gap-4 lg:grid-cols-2">
          ${card('Keys', `
            <div class="grid grid-cols-1 gap-3">
              <div>
                <div class="text-xs tracking-widest text-slate-400">ADMIN PASSWORD (X-Admin-Key)</div>
                <div class="mt-1 text-xs text-slate-500">Protects Mission Control admin actions (jobs, avatars, settings). Set <span class="font-mono text-slate-200">ADMIN_API_KEY</span> on the server.</div>
                <div class="mt-2 flex gap-2">
                  <input id="set_admin" type="${adminType}" class="w-full rounded-xl border border-slate-800 bg-slate-950/40 px-3 py-2 text-sm" placeholder="ADMIN_API_KEY" value="${htmlesc(state.adminKey)}" />
                  <button class="shrink-0 rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-sm" onclick="toggleKey('set_admin')">${state.showAdminKey ? 'Hide' : 'Show'}</button>
                </div>
                <div class="mt-1 text-xs text-slate-500">Server configured: <span class="text-slate-200">${adminConfigured ? 'yes' : 'no'}</span></div>
              </div>
              <div>
                <div class="text-xs tracking-widest text-slate-400">OPS PASSWORD (X-Ops-Key)</div>
                <div class="mt-1 text-xs text-slate-500">Protects automation that can enqueue many jobs (Selector/Scanner/etc). Set <span class="font-mono text-slate-200">OPS_API_KEY</span> on the server.</div>
                <div class="mt-2 flex gap-2">
                  <input id="set_ops" type="${opsType}" class="w-full rounded-xl border border-slate-800 bg-slate-950/40 px-3 py-2 text-sm" placeholder="OPS_API_KEY" value="${htmlesc(state.opsKey)}" />
                  <button class="shrink-0 rounded-xl border border-slate-800 bg-slate-900 px-3 py-2 text-sm" onclick="toggleKey('set_ops')">${state.showOpsKey ? 'Hide' : 'Show'}</button>
                </div>
                <div class="mt-1 text-xs text-slate-500">Server configured: <span class="text-slate-200">${opsConfigured ? 'yes' : 'no'}</span></div>
              </div>
              <div class="flex gap-2">
                <button class="rounded-xl bg-sky-500 px-4 py-2 text-sm font-semibold text-slate-950" onclick="saveKeys()">Save</button>
                <button class="rounded-xl border border-slate-800 bg-slate-900 px-4 py-2 text-sm" onclick="refreshAll()">Refresh all</button>
              </div>
              <div class="text-xs text-slate-500">If ADMIN_API_KEY is not set on the server, admin endpoints return 503 (disabled). For production, set ADMIN_API_KEY in Railway env.</div>
            </div>
          `)}

          ${card('Selector (Phase 3)', `
            <div class="grid grid-cols-1 gap-3">
              <div class="text-sm text-slate-300">Runs products.csv scoring and queues top jobs. Requires OPS_API_KEY on the server.</div>
              <div class="flex gap-2">
                <button class="rounded-xl border border-slate-800 bg-slate-900 px-4 py-2 text-sm" onclick="runSelector()">Run selector</button>
                <button class="rounded-xl border border-slate-800 bg-slate-900 px-4 py-2 text-sm" onclick="loadOps()">Refresh ops</button>
              </div>
              <pre id="sel_out" class="max-h-64 overflow-auto rounded-xl border border-slate-800 bg-slate-900/30 p-3 text-xs text-slate-200"></pre>
            </div>
          `)}
        </div>
      `;
    }

    function saveKeys() {
      state.adminKey = qs('#set_admin').value.trim();
      state.opsKey = qs('#set_ops').value.trim();
      localStorage.setItem('mc_admin_key', state.adminKey);
      localStorage.setItem('mc_ops_key', state.opsKey);
      toast('Saved keys to this browser', 'ok');
    }

    function toggleKey(id) {
      if (id === 'set_admin') state.showAdminKey = !state.showAdminKey;
      if (id === 'set_ops') state.showOpsKey = !state.showOpsKey;
      renderSettings();
    }

    async function runSelector() {
      try {
        const j = await api('/api/selector/run', { method: 'POST', body: '{}', ops: true });
        qs('#sel_out').textContent = JSON.stringify(j, null, 2);
        toast('Selector completed', 'ok');
        await refreshAll();
      } catch (e) {
        qs('#sel_out').textContent = e.message || String(e);
        toast(e.message || String(e), 'error');
      }
    }

    async function refreshAll() {
      try {
        await loadOps();
        await loadTemplates();
        if (state.adminKey) {
          try { await loadQueue(); } catch (e) { /* ignore */ }
          try { await loadAnalytics(); } catch (e) { /* ignore */ }
        } else {
          renderQueue();
          state.analytics = null;
          renderAnalytics();
        }
        await loadAvatars();
        renderHitl();
        renderSettings();
      } catch (e) {
        toast(e.message || String(e), 'error');
      }
    }

    function init() {
      setTab('ops');
      renderHitl();
      renderSettings();
      refreshAll();
      setInterval(() => {
        if (!document.hidden) loadOps().catch(() => {});
      }, 30000);
    }

    init();
  </script>
</body>
</html>
